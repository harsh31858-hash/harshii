<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Love &amp; Remember ❤️</title>
<meta name="description" content="A cozy little corner for sweet moments, hugs, and remembering how loved he is.">
<meta name="theme-color" content="#ffd6e8">

<!-- PWA manifest (inlined at runtime so the whole app stays one file) -->
<link rel="manifest" id="manifestLink">

<!-- App icon (inlined SVG favicon, doubles as install icon) -->
<link rel="icon" id="iconLink" type="image/svg+xml">
<link rel="apple-touch-icon" id="appleIconLink">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --rose-50:#fff5f8;
  --rose-100:#ffe3ec;
  --rose-300:#ffb6d0;
  --rose-500:#ff7fa8;
  --rose-700:#e85a8c;
  --sky-100:#e6f3ff;
  --sky-300:#bfe1ff;
  --sky-500:#8fc6f4;
  --sky-700:#3f7fb0;
  --lav-300:#e7d4ff;
  --cream:#fffaf6;
  --ink:#4a4554;
  --ink-soft:#857e92;
  --gold:#ffd56b;
  --sad-gray:#9aa0ac;
  --shadow-rose: 0 10px 30px -10px rgba(232, 90, 140, 0.35);
  --shadow-blue: 0 10px 30px -10px rgba(63, 127, 176, 0.3);
  --radius-xl: 28px;
  --radius-lg: 22px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}

body{
  font-family:'Quicksand', 'Baloo 2', system-ui, -apple-system, sans-serif;
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,214,232,0.9), transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(191,225,255,0.9), transparent 50%),
    radial-gradient(circle at 50% 90%, rgba(231,212,255,0.55), transparent 55%),
    linear-gradient(160deg, var(--rose-100) 0%, var(--sky-100) 55%, var(--lav-300) 100%);
  background-attachment:fixed;
  color:var(--ink);
  overflow-x:hidden;
  position:relative;
  -webkit-font-smoothing:antialiased;
  transition:filter 0.6s ease;
}
body.sad-mode{
  filter:saturate(0.55) brightness(0.97);
}

/* ---------- Ambient floating hearts (background) ---------- */
#bgHearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.bg-heart{
  position:absolute;
  bottom:-10%;
  font-size:22px;
  opacity:0.55;
  filter:drop-shadow(0 2px 6px rgba(232,90,140,0.25));
  animation:floatUp linear infinite;
  will-change:transform, opacity;
}
@keyframes floatUp{
  0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
  10%{ opacity:0.6; }
  50%{ transform:translateY(-55vh) translateX(var(--drift,20px)) rotate(15deg); }
  90%{ opacity:0.4; }
  100%{ transform:translateY(-110vh) translateX(calc(var(--drift,20px) * -1)) rotate(-10deg); opacity:0; }
}

/* ---------- Burst hearts (interaction feedback) ---------- */
#burstLayer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:50;
  overflow:hidden;
}
.burst-heart{
  position:absolute;
  font-size:26px;
  will-change:transform, opacity;
  animation:burstFly 1.4s ease-out forwards;
}
@keyframes burstFly{
  0%{ transform:translate(0,0) scale(0.4) rotate(0deg); opacity:1; }
  15%{ transform:translate(calc(var(--bx) * 0.3), calc(var(--by) * 0.3)) scale(1.1) rotate(var(--rot)); opacity:1; }
  100%{ transform:translate(var(--bx), var(--by)) scale(0.5) rotate(calc(var(--rot) * 1.6)); opacity:0; }
}
.burst-heart.broken-heart{
  animation:brokenFall 1.5s ease-in forwards;
}
@keyframes brokenFall{
  0%{ transform:translate(0,0) scale(0.6) rotate(0deg); opacity:1; }
  100%{ transform:translate(var(--bx), calc(var(--by) * -1 + 140px)) scale(0.5) rotate(var(--rot)); opacity:0; }
}

/* ---------- Page shell ---------- */
.wrap{
  position:relative;
  z-index:1;
  max-width:640px;
  margin:0 auto;
  padding:28px 18px 60px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* ---------- Title ---------- */
.title-row{
  text-align:center;
  margin-top:4px;
}
.app-title{
  font-family:'Fredoka', 'Baloo 2', 'Quicksand', sans-serif;
  font-weight:700;
  font-size:clamp(28px, 6vw, 44px);
  letter-spacing:0.5px;
  margin:0;
  color:var(--rose-700);
  text-shadow:0 2px 0 rgba(255,255,255,0.6);
  line-height:1.15;
}
.app-title .heart-emoji{
  display:inline-block;
  animation:titleBeat 1.6s ease-in-out infinite;
  transform-origin:center;
}
@keyframes titleBeat{
  0%,100%{ transform:scale(1); }
  15%{ transform:scale(1.22); }
  30%{ transform:scale(0.96); }
  45%{ transform:scale(1.12); }
  60%{ transform:scale(1); }
}
.char-name{
  margin:0;
  font-family:'Fredoka', 'Baloo 2', 'Quicksand', sans-serif;
  font-weight:700;
  font-size:clamp(20px, 4.5vw, 28px);
  color:var(--sky-700);
  text-align:center;
  letter-spacing:0.3px;
  text-shadow:0 2px 0 rgba(255,255,255,0.6);
}

/* ---------- Meters panel ---------- */
.meters-card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:var(--radius-lg);
  padding:14px 18px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:var(--shadow-rose);
  width:100%;
  max-width:420px;
}
.meter-block{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.meter-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
}
.meter-head .label{
  display:flex;
  align-items:center;
  gap:5px;
}
.meter-head .value{
  font-size:11px;
  font-weight:700;
  color:var(--ink-soft);
  letter-spacing:0;
  text-transform:none;
}
.meter-track{
  position:relative;
  height:14px;
  border-radius:10px;
  background:rgba(255,255,255,0.7);
  box-shadow:inset 0 1px 4px rgba(0,0,0,0.08);
  overflow:hidden;
}
.meter-fill{
  position:absolute;
  inset:0;
  width:0%;
  border-radius:10px;
  transition:width 0.5s cubic-bezier(.34,1.2,.64,1);
}
.meter-fill.love{ background:linear-gradient(90deg, var(--rose-300), var(--rose-700)); color:var(--rose-700); }
.meter-fill.hunger{ background:linear-gradient(90deg, #ffd98a, #ff9f4a); }
.meter-fill.energy{ background:linear-gradient(90deg, var(--sky-300), var(--sky-700)); }
.meter-head.love-text .label{ color:var(--rose-700); }
.meter-head.hunger-text .label{ color:#c97a1f; }
.meter-head.energy-text .label{ color:var(--sky-700); }

/* ---------- Character stage ---------- */
.stage{
  position:relative;
  width:min(78vw, 300px);
  height:min(78vw, 300px);
  margin:6px auto 0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.stage-glow{
  position:absolute;
  inset:-6%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(143,198,244,0.5), rgba(255,182,208,0.3) 60%, transparent 75%);
  filter:blur(6px);
  animation:glowPulse 3.4s ease-in-out infinite;
  z-index:0;
  transition:background 0.6s ease;
}
@keyframes glowPulse{
  0%,100%{ transform:scale(1); opacity:0.8; }
  50%{ transform:scale(1.06); opacity:1; }
}
.char-wrap{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  transition:transform 0.25s ease, filter 0.6s ease;
  transform-origin:50% 85%;
  animation:idleBob 3.2s ease-in-out infinite;
}
@keyframes idleBob{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  50%{ transform:translateY(-6px) rotate(0.6deg); }
}
.char-wrap.sad-filter{
  filter:grayscale(0.75) brightness(0.92) contrast(0.95);
}

/* floor shadow */
.char-shadow{
  position:absolute;
  bottom:2%;
  left:50%;
  width:55%;
  height:14px;
  background:radial-gradient(ellipse, rgba(80,80,100,0.28), transparent 75%);
  border-radius:50%;
  transform:translateX(-50%);
  z-index:1;
  transition:width 0.3s ease, opacity 0.3s ease;
}

/* ---------- Action buttons ---------- */
.actions{
  width:100%;
  max-width:480px;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
  margin-top:4px;
}
@media (min-width:420px){
  .actions{ grid-template-columns:repeat(3, 1fr); }
}
.act-btn{
  position:relative;
  border:none;
  cursor:pointer;
  border-radius:20px;
  padding:14px 8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-family:'Fredoka','Quicksand',sans-serif;
  font-weight:600;
  font-size:13.5px;
  color:var(--rose-700);
  background:linear-gradient(160deg, #ffffff 0%, var(--rose-100) 100%);
  box-shadow:0 6px 0 rgba(232,90,140,0.18), 0 10px 18px -8px rgba(232,90,140,0.35);
  transition:transform 0.12s ease, box-shadow 0.12s ease;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.act-btn .emoji{
  font-size:26px;
  line-height:1;
  transition:transform 0.2s ease;
}
.act-btn:hover{ transform:translateY(-3px); }
.act-btn:active{
  transform:translateY(2px) scale(0.96);
  box-shadow:0 2px 0 rgba(232,90,140,0.18), 0 4px 10px -4px rgba(232,90,140,0.35);
}
.act-btn.pressed .emoji{ animation:btnPop 0.45s ease; }
@keyframes btnPop{
  0%{ transform:scale(1) rotate(0deg); }
  35%{ transform:scale(1.4) rotate(-12deg); }
  70%{ transform:scale(0.9) rotate(8deg); }
  100%{ transform:scale(1) rotate(0deg); }
}
.act-btn.sleep-btn{ background:linear-gradient(160deg, #ffffff 0%, var(--sky-100) 100%); color:#3f6f93; box-shadow:0 6px 0 rgba(143,198,244,0.3), 0 10px 18px -8px rgba(143,198,244,0.45);}
.act-btn.wake-btn{ background:linear-gradient(160deg, #ffffff 0%, #fff3cf 100%); color:#9a7a1f; box-shadow:0 6px 0 rgba(255,213,107,0.35), 0 10px 18px -8px rgba(255,213,107,0.45);}
.act-btn.beat-btn{ background:linear-gradient(160deg, #ffffff 0%, #e8e8ee 100%); color:#5c5c6e; box-shadow:0 6px 0 rgba(120,120,140,0.25), 0 10px 18px -8px rgba(120,120,140,0.35);}

/* ---------- Status / speech bubble ---------- */
.speech-bubble{
  position:relative;
  background:#fff;
  border-radius:18px;
  padding:10px 18px;
  font-size:14.5px;
  font-weight:600;
  color:var(--ink);
  box-shadow:0 8px 20px -8px rgba(232,90,140,0.3);
  max-width:320px;
  text-align:center;
  min-height:22px;
  transition:transform 0.25s ease, opacity 0.25s ease, background 0.4s ease, color 0.4s ease;
}
.speech-bubble::after{
  content:'';
  position:absolute;
  bottom:-9px;
  left:50%;
  transform:translateX(-50%);
  border-width:10px 9px 0 9px;
  border-style:solid;
  border-color:#fff transparent transparent transparent;
  transition:border-color 0.4s ease;
}
.speech-bubble.bump{ animation:bubbleBump 0.35s ease; }
.speech-bubble.sad{
  background:#eceef2;
  color:#5c5c6e;
}
.speech-bubble.sad::after{ border-color:#eceef2 transparent transparent transparent; }
@keyframes bubbleBump{
  0%{ transform:scale(0.85); opacity:0.5; }
  60%{ transform:scale(1.05); }
  100%{ transform:scale(1); opacity:1; }
}

/* ---------- Message box ---------- */
.message-card{
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:var(--radius-lg);
  padding:16px 18px 18px;
  box-shadow:var(--shadow-rose);
  display:flex;
  flex-direction:column;
  gap:10px;
}
.message-card label{
  font-size:12.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--rose-700);
}
.message-reply{
  background:#fff;
  border-radius:14px;
  padding:9px 14px;
  font-size:14px;
  font-weight:600;
  color:var(--ink);
  box-shadow:0 4px 12px -6px rgba(232,90,140,0.3);
  transition:background 0.4s ease, color 0.4s ease;
}
.message-reply.sad{
  background:#eceef2;
  color:#5c5c6e;
}
.message-reply.bump{
  animation:bubbleBump 0.35s ease;
}
.message-row{ display:flex; gap:8px; }
.message-row input{
  flex:1;
  border:1.5px solid var(--rose-300);
  border-radius:14px;
  padding:11px 14px;
  font-size:14.5px;
  font-family:inherit;
  font-weight:600;
  color:var(--ink);
  background:#fff;
  outline:none;
  transition:border-color 0.2s ease, box-shadow 0.2s ease;
}
.message-row input::placeholder{ color:#c79bb1; font-weight:500; }
.message-row input:focus{
  border-color:var(--rose-500);
  box-shadow:0 0 0 3px rgba(255,127,168,0.18);
}
.send-btn{
  border:none;
  border-radius:14px;
  padding:0 18px;
  background:linear-gradient(160deg, var(--rose-500), var(--rose-700));
  color:#fff;
  font-weight:700;
  font-family:'Fredoka','Quicksand',sans-serif;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 14px -4px rgba(232,90,140,0.5);
  transition:transform 0.12s ease;
}
.send-btn:active{ transform:scale(0.94); }

/* ---------- Footer note ---------- */
.footer-note{
  margin-top:8px;
  font-size:12px;
  color:var(--ink-soft);
  text-align:center;
  font-weight:600;
  opacity:0.8;
}

/* ---------- Install banner ---------- */
.install-banner{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%) translateY(120%);
  background:#fff;
  border-radius:16px;
  padding:12px 16px;
  box-shadow:0 12px 30px -8px rgba(90,68,86,0.35);
  display:flex;
  align-items:center;
  gap:12px;
  z-index:100;
  transition:transform 0.4s cubic-bezier(.2,.9,.25,1.2);
  max-width:90vw;
}
.install-banner.show{ transform:translateX(-50%) translateY(0); }
.install-banner span{ font-size:13.5px; font-weight:600; color:var(--ink); }
.install-banner button{
  border:none;
  border-radius:10px;
  padding:8px 14px;
  font-weight:700;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
}
.install-banner .btn-install{ background:var(--rose-500); color:#fff; }
.install-banner .btn-dismiss{ background:transparent; color:var(--ink-soft); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
}

@media (max-width:360px){
  .app-title{ font-size:24px; }
  .act-btn{ font-size:12px; padding:12px 6px; }
  .act-btn .emoji{ font-size:22px; }
}
</style>
</head>
<body>

<div id="bgHearts" aria-hidden="true"></div>
<div id="burstLayer" aria-hidden="true"></div>

<div class="wrap">

  <div class="title-row">
    <h1 class="app-title">My Love <span class="heart-emoji">❤️</span></h1>
  </div>

  <div class="meters-card">
    <div class="meter-block">
      <div class="meter-head love-text">
        <span class="label">💗 Love</span>
        <span class="value" id="loveValue">0 / 50</span>
      </div>
      <div class="meter-track"><div class="meter-fill love" id="loveFill"></div></div>
    </div>
    <div class="meter-block">
      <div class="meter-head hunger-text">
        <span class="label">🍫 Hunger</span>
        <span class="value" id="hungerValue">50 / 100</span>
      </div>
      <div class="meter-track"><div class="meter-fill hunger" id="hungerFill"></div></div>
    </div>
    <div class="meter-block">
      <div class="meter-head energy-text">
        <span class="label">⚡ Energy</span>
        <span class="value" id="energyValue">50 / 100</span>
      </div>
      <div class="meter-track"><div class="meter-fill energy" id="energyFill"></div></div>
    </div>
  </div>

  <h2 class="char-name">Harshii</h2>
  <div class="stage">
    <div class="stage-glow" id="stageGlow"></div>
    <div class="char-wrap" id="charWrap">
      <!-- character SVG injected by JS -->
    </div>
    <div class="char-shadow" id="charShadow"></div>
  </div>

  <div class="speech-bubble" id="speechBubble">Hey there 💙 I missed you...</div>

  <div class="actions" id="actionsRow">
    <button class="act-btn" data-action="hug"><span class="emoji">🤗</span>Hug</button>
    <button class="act-btn" data-action="kiss"><span class="emoji">💋</span>Kiss</button>
    <button class="act-btn" data-action="cuddle"><span class="emoji">🫂</span>Cuddle</button>
    <button class="act-btn" data-action="holdhands"><span class="emoji">🤝</span>Hold Hands</button>
    <button class="act-btn" data-action="feed"><span class="emoji">🍫</span>Feed</button>
    <button class="act-btn sleep-btn" data-action="sleep"><span class="emoji">😴</span>Sleep</button>
    <button class="act-btn wake-btn" data-action="wake"><span class="emoji">🌅</span>Wake Up</button>
    <button class="act-btn beat-btn" data-action="beat"><span class="emoji">💔</span>Beat</button>
  </div>

  <div class="message-card">
    <label for="msgInput">Say something sweet</label>
    <div class="message-reply" id="messageReply">He'll reply right here 💌</div>
    <div class="message-row">
      <input type="text" id="msgInput" maxlength="120" placeholder="Type a little message for him...">
      <button class="send-btn" id="sendBtn">Send 💌</button>
    </div>
  </div>

  <p class="footer-note">made with care, one little moment at a time 🌷</p>
</div>

/* ---------- Meters (localStorage) ---------- */
const STORAGE_KEY = 'myLoveAndRemember_state_v2';
const MAX_LOVE = 50;
const MAX_STAT = 100;
const DRAIN_INTERVAL_MS = 60 * 1000; // every minute
const HUNGER_DRAIN_PER_TICK = 2;
const ENERGY_DRAIN_PER_TICK = 2;

function loadState(){
  let saved = null;
  try{ saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ saved = null; }
  const now = Date.now();
  const state = {
    love: 0,
    hunger: 50,
    energy: 50,
    lastTick: now
  };
  if(saved && typeof saved === 'object'){
    if(typeof saved.love === 'number') state.love = saved.love;
    if(typeof saved.hunger === 'number') state.hunger = saved.hunger;
    if(typeof saved.energy === 'number') state.energy = saved.energy;
    if(typeof saved.lastTick === 'number') state.lastTick = saved.lastTick;
  }
  // catch up on drain that happened while the app was closed
  const elapsedTicks = Math.floor((now - state.lastTick) / DRAIN_INTERVAL_MS);
  if(elapsedTicks > 0){
    state.hunger = clamp(state.hunger - elapsedTicks * HUNGER_DRAIN_PER_TICK, 0, MAX_STAT);
    state.energy = clamp(state.energy - elapsedTicks * ENERGY_DRAIN_PER_TICK, 0, MAX_STAT);
    state.lastTick = now;
  }
  state.love = clamp(state.love, 0, MAX_LOVE);
  return state;
}

function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

let state = loadState();

function saveState(){
  state.lastTick = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ---------- Heart burst effect ---------- */
const burstLayer = document.getElementById('burstLayer');
const HEART_CHOICES = ['❤️','💕','💗','💖','💓','💞'];

function spawnHeartBurst(originEl, count = 10, broken = false){
  const rect = originEl.getBoundingClientRect();
  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height * 0.35;

  for(let i=0;i<count;i++){
    const heart = document.createElement('div');
    heart.className = 'burst-heart' + (broken ? ' broken-heart' : '');
    heart.textContent = broken ? '💔' : HEART_CHOICES[Math.floor(Math.random()*HEART_CHOICES.length)];
    const angle = (Math.PI * 2 * i / count) + (Math.random()*0.6 - 0.3);
    const dist = 60 + Math.random()*100;
    const bx = Math.cos(angle) * dist;
    const by = broken
      ? Math.abs(Math.sin(angle) * dist * 0.4) // mostly downward drift for broken hearts
      : (Math.sin(angle) * dist) - 60 - Math.random()*60;
    const rot = (Math.random()*60 - 30);
    heart.style.setProperty('--bx', `${bx}px`);
    heart.style.setProperty('--by', `${by}px`);
    heart.style.setProperty('--rot', `${rot}deg`);
    heart.style.left = `${originX}px`;
    heart.style.top = `${originY}px`;
    heart.style.fontSize = `${16 + Math.random()*16}px`;
    heart.style.animationDelay = `${Math.random()*0.15}s`;
    burstLayer.appendChild(heart);
    setTimeout(() => heart.remove(), 1700);
  }
}

let audioUnlocked = false;
function unlockAudio(){
  // Some mobile browsers need one "real" play+pause inside a user gesture
  // before audio.play() will work later. This primes that on first tap anywhere.
  if(audioUnlocked) return;
  audioUnlocked = true;
  kissAudio.volume = 1;
  kissAudio.play().then(() => {
    kissAudio.pause();
    kissAudio.currentTime = 0;
  }).catch(() => { /* will just try again normally on the real kiss tap */ });
}
document.addEventListener('pointerdown', unlockAudio, { once: true });

function playKissAudio(){
  try{
    kissAudio.pause();
    kissAudio.currentTime = 0;
    const playPromise = kissAudio.play();
    if(playPromise && playPromise.catch){
      playPromise.catch((err) => {
        console.warn('Kiss audio could not play:', err);
      });
    }
  }catch(e){ console.warn('Kiss audio error:', e); }
}

const CHAT_WORKER_URL = 'https://harsh-love-chat.harsh31858.workers.dev';

// Fallback replies used only if the AI call fails (e.g. she's offline / worker hiccup)

/* ---- Conversation memory (persists across reloads on this device) ---- */
const CHAT_HISTORY_KEY = 'harshiiLoveApp_chatHistory_v1';
const MAX_HISTORY_MESSAGES = 40; // ~20 exchanges, keeps requests fast & cheap

function loadChatHistory(){
  try{
    const saved = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY));
    if(Array.isArray(saved)) return saved;
  }catch(e){ /* ignore corrupt data */ }
  return [];
}

let chatHistory = loadChatHistory();

function saveChatHistory(){
  try{
    localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory));
  }catch(e){ /* storage full or unavailable — conversation just won't persist this time */ }
}

function pushToHistory(role, content){
  chatHistory.push({ role, content });
  if(chatHistory.length > MAX_HISTORY_MESSAGES){
    chatHistory = chatHistory.slice(-MAX_HISTORY_MESSAGES);
  }
  saveChatHistory();
}

async function getAIReply(text){
  const response = await fetch(CHAT_WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, history: chatHistory })
  });
  if(!response.ok) throw new Error('Worker responded with ' + response.status);
  const data = await response.json();
  if(!data.reply) throw new Error('No reply field in response');
  return data.reply;
}

async function reactToMessage(text){
  if(isSleeping){
    say("Shh... still asleep. Wake me up first 😴");
    headGroup.style.transition = 'transform 0.2s ease';
    headGroup.style.transform = 'rotate(-2deg)';
    setTimeout(() => { headGroup.style.transform = 'rotate(2deg)'; }, 180);
    setTimeout(() => { headGroup.style.transform = ''; }, 360);
    return;
  }

  if(isSad) exitSad();

  // Show a gentle "typing" state while waiting for the reply
  setMouth(MOUTHS.smile);
  setBlush(true, 0.5);
  say("...");
  sendBtn.disabled = true;

  let replyText;
  try{
    replyText = await getAIReply(text);
    // Only remember the exchange if the AI actually replied (don't pollute memory with failures)
    pushToHistory('user', text);
    pushToHistory('assistant', replyText);
  }catch(err){
    console.warn('AI reply failed, using fallback:', err);
    replyText = pickFallback();
  }finally{
    sendBtn.disabled = false;
  }

  setMouth(MOUTHS.openHappy);
  setBlush(true, 0.7);
  say(replyText);
  bounceChar(1.07, Math.random() > 0.5 ? 3 : -3);
  spawnHeartBurst(charWrap, 10);
  adjustLove(2);
  resetFaceSoon(1600);
}

function handleSend(){
  const text = msgInput.value.trim();
  if(!text) return;
  reactToMessage(text);
  msgInput.value = '';
  msgInput.blur();
}

sendBtn.addEventListener('click', handleSend);
msgInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') handleSend();
});

/* ---------- First-load greeting ---------- */
setTimeout(() => {
  setBlush(true, 0.4);
  resetFaceSoon(1800);
}, 600);

/* =========================================================
   PWA SETUP — inlined manifest + service worker so the
   whole app installs from this single HTML file
   ========================================================= */

const ICON_SVG = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8FC6F4"/>
      <stop offset="100%" stop-color="#FF7FA8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="#FFF5F8"/>
  <path d="M96 152 C50 122 28 96 28 68 C28 44 46 28 68 28 C82 28 92 35 96 46 C100 35 110 28 124 28 C146 28 164 44 164 68 C164 96 142 122 96 152 Z" fill="url(#g)"/>
</svg>`;

function svgToDataUri(svg){ return 'data:image/svg+xml;base64,' + btoa(svg); }

const iconDataUri = svgToDataUri(ICON_SVG);
document.getElementById('iconLink').href = iconDataUri;
document.getElementById('appleIconLink').href = iconDataUri;

const manifest = {
  name: "My Love & Remember",
  short_name: "Love & Remember",
  description: "A cozy little corner for sweet moments, hugs, and remembering how loved he is.",
  start_url: ".",
  display: "standalone",
  background_color: "#ffe3ec",
  theme_color: "#ffd6e8",
  orientation: "portrait",
  icons: [
    { src: iconDataUri, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
    { src: iconDataUri, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('manifestLink').href = URL.createObjectURL(manifestBlob);

const SW_SOURCE = `
  self.addEventListener('install', (e) => { self.skipWaiting(); });
  self.addEventListener('activate', (e) => { self.clients.claim(); });
  self.addEventListener('fetch', (e) => {
    e.respondWith(
      fetch(e.request).catch(() => caches.match(e.request))
    );
  });
`;
if('serviceWorker' in navigator){
  try{
    const swBlob = new Blob([SW_SOURCE], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  } catch(e) {}
}

/* Install prompt banner */
const installBanner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const dismissBtn = document.getElementById('dismissBtn');
let deferredInstallEvent = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallEvent = e;
  if(!localStorage.getItem('loveApp_installDismissed')){
    setTimeout(() => installBanner.classList.add('show'), 1500);
  }
});

installBtn.addEventListener('click', async () => {
  installBanner.classList.remove('show');
  if(deferredInstallEvent){
    deferredInstallEvent.prompt();
    await deferredInstallEvent.userChoice;
    deferredInstallEvent = null;
  }
});

dismissBtn.addEventListener('click', () => {
  installBanner.classList.remove('show');
  localStorage.setItem('loveApp_installDismissed', '1');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
});
</script>
